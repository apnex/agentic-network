  - id: 70
    class: methodology
    title: "Architectural-simplification via Director-progressive-question (fix-class-recursion at architectural level → substrate-redesign signal)"
    origin: mission-78-W2-extension + 2026-05-12 Director-consult session
    surfaced_at: operator-channel substrate-design conversation (Director-progressive-question pattern)
    status: open
    closure_mechanism: |
      Pattern-recognition; no closure-PR (architectural-pathology meta-pattern).

      Diagnostic signature: when architect proposes a substrate-level primitive
      (e.g. writer-lock with TTL + heartbeat + override flag), question whether
      the underlying concern is substrate-layer or coordination-layer. The lock
      primitive was a substrate-level fix for a Hub-coordination concern (single-
      writer-per-scope policy). Once reframed as "Hub-policy at mission-entity
      layer", the lock primitive dissolved entirely.

      Sibling-direction pattern: Director-progressive-question collapsed multiple
      layers of accidental complexity in Design v5.0:
      - "Why do we need both mission/<id> + wip/<id>?" → drop wip; single-branch
      - "Why coord-remote? Reader can just join?" → drop coord-remote; single repo
      - "Do we need a lock? Branches don't collide" → drop writer-lock primitive;
        Hub-policy instead
      Each question collapsed a layer.

      Architectural-pathology composition: Fix-class-recursion (each fix exposes
      next defect — calibrations #67 + #68 capture the test-net side) is a SIGNAL
      of architectural-drift at the substrate level. When 3+ consecutive substrate-
      fixes appear in same code-area without reaching wave-close, the right
      response is often substrate-redesign (collapse the architecture), NOT another
      incremental fix.

      Application instance: mission-78 W2-extension. 5 substrate-fixes proposed
      (Fix #1-#4 shipped + Fix #5 debate); pause + redesign yielded Design v5.0
      collapse of writer-lock + coord-remote + dual-branch + multi-participant
      into single-branch + independent-missions + shared-repo-URL + Hub-policy.
