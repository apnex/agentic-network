      activityState) — first canonical execution of "rename-only-what-needs-renaming"
      discipline post-mission-57 idea-206. Folded into Design v1.0 §2 ratified bilaterally
      on thread-387 round 10.
    closure_pr: 110
    cross_refs:
      - docs/designs/m-agent-entity-revisit-design.md
    tele_alignment:
      - tele-3

