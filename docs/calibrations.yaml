      render verbatim full content (per W4 tests #4, #6); only event=thread_message
      exhibits silent cutoff. Architectural framing: Hub-side thread_message
      envelope-builder applies the truncation; render-template at adapter-side has no
      knowledge. Marker-protocol options sketched:
      (a) Hub embeds marker token at truncation boundary;
      (b) Hub adds <channel> attribute truncated="true" fullBytes="<n>";
      (c) marker-protocol design at idea-220 Phase 2.

      Closed structurally by mission-66 W1+W2 commit 6 (`d321d7e`; PR #135 admin-merged
      at `2f66da5`) per architect-lean (b) `<channel>` attribute approach. Hub
      envelope-builder at thread-policy.ts adds `truncated="true"` + `fullBytes="<n>"`
      attributes when body byte-length exceeds threshold (200 chars constant).
      Adapter render-template-registry consumes attributes + renders body + marker
      suffix `[…<N> bytes truncated; query thread for full content]` per Design v1.0
      §2.1.2. Both architect-side AND engineer-side adapter render-templates upgraded
      atomically (single `@apnex/network-adapter` SDK package; coordinated upgrade
      automatic per anti-goal #8). 6 thread_message-marker unit tests pass-clean.
      Vertex-cloudrun adapter (Phase 3 mission) adopts marker-protocol at Phase 3 with
      stable v1 contract.
    closure_pr: 135
    cross_refs:
      - idea-220
      - docs/audits/m-wire-entity-convergence-w4-validation.md
    tele_alignment:
      - tele-3

