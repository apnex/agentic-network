# patterns[] — per-entry schema:
#   id                          string slug; stable kebab-case
#   title                       string; human-readable pattern name
#   origin                      string; "mission-X-WN" where pattern was first named
#   description                 string (multiline); pattern definition + diagnostic signature
#   surfaced_by_calibrations    list of calibration ids; non-empty
#   methodology_doc_subsection  string (optional); path + anchor to methodology-doc explanation
patterns:
  - id: methodology-bypass-becomes-substrate-defect-amplification-loop
    title: "Methodology-bypass-becomes-substrate-defect amplification loop"
    origin: mission-64-W4-followon
    description: |
      Architectural-pathology pattern. When a methodology-prescribed protocol (here:
      Option A thread for architect→engineer PR-review-request) is bypassed in favor
      of a "lighter-weight" alternative (here: kind=note), the bypass path can compose
      with substrate-level rendering + tool-surface gaps to produce silent
      actionable-content drop with bilateral blind-spot.

      Diagnostic signature (4 components):
      1. Architect-side believes the action succeeded — create_message returns clean
         messageId; no error feedback.
      2. Engineer-side sees content degrade silently — render-template doesn't know
         the payload shape; "(empty note body)" rendered.
      3. No return-path — engineer-side create_message is intentionally absent
         (authority-boundary role-filter); recipient cannot reciprocate even if
         rendering had succeeded.
      4. No round-trip detection mechanism — no Hub-side ack-or-nack signaling that
         lets architect-side discover the failure.

      Amplification: methodology-bypass + render-gap + no-return-path = silent
      actionable-content drop. None of the three components alone is a defect (each
      has legitimate non-bypass uses); their composition is the architectural
      pathology.

      Forward-discipline (3-component test for filing future calibrations):
      (1) Was a methodology-prescribed protocol bypassed?
      (2) Does the bypass path interact with a render-template-registry incompleteness
          or schema-validation gap?
      (3) Does the bypass path cross a tool-surface authority boundary that breaks
          return-path?
      If yes to all three → file as architectural-pathology class (single named
      calibration). Per-component yes → file as independent calibrations.
    surfaced_by_calibrations:
      - 41
    methodology_doc_subsection: "docs/methodology/multi-agent-pr-workflow.md#methodology-bypass-becomes-substrate-defect-amplification-loop"

  - id: two-sided-convergence-accounting
    title: "Two-sided convergence accounting (round-counting diplomatic phrasing)"
    origin: mission-64-W4-followon
    description: |
      Discipline pattern surfaced via mission-64 cleanup arc (thread-414 round 4 +
      thread-415 round 1). When bilateral close-of-thread events occur asymmetrically
      across architect + engineer rounds, narrative summaries should phrase round-count
      attribution diplomatically rather than crediting "the architect closed at round
      N" or "the engineer closed at round M" — both sides participate in convergence.

      Pattern: convergence is two-sided; the round-count framing should acknowledge
      bilateral close even when the structural commit is mechanically one-sided (e.g.,
      architect commits the converged=true flip after engineer round-N
      close-of-bilateral). Avoid round-counting language that implies one party "won"
      or "drove" closure when both parties signaled convergence.

      Mission-64 example: thread-411 round 4 engineer close-of-bilateral + round 5
      architect-side commit. Diplomatic phrasing: "thread-411 round 4 close-of-bilateral;
      round 5 architect-side commit." Avoids asymmetric "architect closed at round 5"
      framing.

      Lineage: mission-64 cleanup-arc review-loop surface; co-discovered with engineer
      in thread-415 round 4. Folded inline into mission-64 retrospective + bedded as
      durable architect feedback memory.
    surfaced_by_calibrations:
      - 46

  - id: review-loop-as-calibration-surface
    title: "Review-loop-as-calibration-surface"
    origin: mission-64-W4-followon
    description: |
      Pattern: review cycles for substantive PRs (audit / retrospective / cleanup /
      methodology-fold PRs) systematically surface methodology calibrations +
      sub-discipline refinements that didn't appear in the mission-execution phase.
      Test for them explicitly during PR review.

      Mission-64 cleanup arc (PRs #127 + #129 + #130) surfaced 4 review-loop
      refinements that the mission-execution phase never produced:
      - thread-414 round 2 → Calibration #42 NEW (post-event narration AEST/UTC date
        conflation)
      - thread-414 round 4 + thread-415 round 1 → "Two-sided convergence accounting"
        diplomatic phrasing pattern
      - thread-415 round 2 → Fresh-install settings.json rollback edge-case
        (sub-discipline of e2e rollback)
      - thread-415 round 2 → "Shallow-clones aren't a fallback case" doc-discipline
        (sub-discipline of #39 closure)

      Mission-65 extension (calibration #44): bilateral pre-alignment thoroughness in
      design-state ratify cycle correlates inversely with round-2 PR-review fold count
      — the pattern extends across review surfaces (design-state + PR-review).

      Recursive nugget: methodology calibrations can emerge from the review loop
      reviewing the same discipline class. Review-loops are calibration-surfacing
      surfaces, not just calibration-assessment surfaces.

      Forward-discipline:
      - During review of audit / retrospective / cleanup / methodology PRs, ask: "is
        the review surfacing calibration-class observations the PR doesn't capture?"
      - For substantive PRs (>100 lines doc or code-touching), expect 1-3 review-loop
        calibrations or sub-discipline refinements.
      - Bilaterally-aligned content (where author + reviewer pre-agreed via threads)
        often STILL surfaces ~2 review-cycle nits — these aren't gaps in
        pre-alignment; they're the review surface doing its job.
      - Capture review-loop calibrations as formal calibrations (not just nits) when
        they're durable methodology observations; sub-discipline refinements fold
        inline.
    surfaced_by_calibrations:
      - 42
      - 44
      - 46
      - 47

  - id: post-event-narration-aest-utc-discipline
    title: "Post-event narration AEST/UTC date conflation discipline"
    origin: mission-64-W4-followon
    description: |
      Authoring docs in AEST timezone (UTC+10) leads to timeline entries that mix AEST
      date with UTC `Z` suffix, producing dates ~1 day forward of actual UTC event
      time. Diagnostic signature: events that occurred 2026-04-28T22:13Z UTC (=
      2026-04-29T08:13 AEST) get authored as "2026-04-29 ~22:13Z" in retrospective
      doc — wrong UTC date with right Z-suffix discipline.

      Discipline (for post-event narration in docs/audits/, docs/reviews/,
      docs/decisions/):
      - Timeline tables use UTC consistently — Z-suffix attached only to UTC
        timestamps.
      - Never mix AEST calendar date with UTC time-of-day-suffix.
      - Acceptable alternatives when UTC-only is awkward:
        (a) explicit AEST qualifier with no Z (e.g., "2026-04-29 ~08:13 AEST")
        (b) parenthetical conversion ("2026-04-28T22:13Z UTC = 2026-04-29T08:13 AEST")
        (c) authoring-meta + event-meta separation (header "authored 2026-04-29 AEST";
            body "events 2026-04-28 UTC").

      Lineage: pre-existing project memory project_session_log_timezone.md notes the
      same skew applies to work-trace entries (~10h forward AEST vs UTC). Calibration
      #42 surfaces the discipline applies broadly to post-event docs, not just
      work-traces. Mission-64 retrospective is the canonical fixup example: UTC-
      consistency restored across §2 timeline + §3 commitments + Closing § via fixup
      commit pre-merge.
    surfaced_by_calibrations:
      - 42
    methodology_doc_subsection: "docs/methodology/multi-agent-pr-workflow.md#post-event-narration-aest-utc-date-conflation-discipline"
