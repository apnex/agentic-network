      Closure path:
      (a) PROCEDURAL — diagnostic test in feedback memory: when designing a
        bypass/filter/allowlist, ask "does this gate match the conceptual
        boundary or enumerate specific instances?" If enumerate, surface as
        review-time concern.
      (b) STRUCTURAL — at Phase 4 Design audit-rubric, add the diagnostic
