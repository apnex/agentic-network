      restart at ~10:25 AEST. Memory feedback_pass10_rebuild_hub_container.md captured
      for future-session discipline. Fix-forward: Pass 10 protocol extension mandates
      build-hub.sh + restart for any PR touching hub/src/**. Folded into idea-219
      Schema-Migration Discipline companion.
    cross_refs:
      - idea-219
      - feedback_pass10_rebuild_hub_container.md
    tele_alignment:
      - tele-7

  - id: 18
    class: substrate
    title: "Wire-shape drift (entity-vs-wire convergence)"
    origin: mission-62-W5
    surfaced_at: P0-triage-2026-04-28
    status: open
    closure_mechanism: |
      P0-triage 2026-04-28: 3 different render behaviors observed for 3 event types
      (pulse, note, thread-message) — clean reproducer for O(N) per-event-type if-ladder
      vs canonical envelope O(1). Director-prompted architectural framing ~10:10 AEST:
      "Agent{} is now first-class managed state object — shouldn't message structure
      reflect this?" Architectural follow-on; the wire envelope must be a projection of
      the entity state. Scoped to idea-219 Wire-Entity Envelope Convergence
      (mission-class L).
    cross_refs:
      - idea-219
      - reference_idea_219_220_post_mission_62.md
    tele_alignment:
      - tele-3

  - id: 19
    class: substrate
    title: "Schema-rename PR without state migration"
    origin: mission-62-W5
    surfaced_at: P0-triage-2026-04-28
    status: closed-folded
    closure_mechanism: |
      P0 smoking gun layer 2: PR #112 (engineerId → agentId) and PR #113 (Agent.agentId
      → Agent.id) shipped code-only renames with NO state migration script. Persisted
      local-fs Agent records had legacy engineerId field; new Hub code reads agent.id
      (undefined); response builder dropped the field via JSON.stringify
      undefined-omission. Hub had been writing records as agents/<agent.id>.json =
      agents/undefined.json since the rename. Recovery action 2026-04-28 ~10:35 AEST:
      state migration renamed engineerId → id in 5 primary key files + 4 by-fingerprint
      index files; salvage of undefined.json; backup at
      /tmp/agents-pre-migration-20260428-103504.tar.gz. Memory
      feedback_schema_rename_requires_state_migration.md captured. Discipline folded
      into idea-219 Schema-Migration Discipline companion.
    closure_pr: 112
    cross_refs:
      - idea-219
      - feedback_schema_rename_requires_state_migration.md
    tele_alignment:
      - tele-3

