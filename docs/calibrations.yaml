  - id: 64
    class: substrate
    title: "Stale-agentId architectural-trap — post-state-migration cross-references in higher-layer entities orphan silently without surface error"
    origin: post-idea-251-fold-D-prime-thread-485-P0
    surfaced_at: thread-485 force-closed P0 (2026-05-06)
    status: open
    closure_mechanism: |
      Surfaced live: idea-251 Fold-D-prime hard cutover renamed all agent records
      from `eng-XXXX` (12-char fingerprint suffix) to `agent-XXXXXXXX` (8-char
      sha256(name) prefix). Migration handled the agent-record rewrite + cleared
      stale by-fingerprint mappings. BUT did NOT rewrite cross-reference fields
      in dependent entities (threads.recipientAgentId, messages.targetAgentId,
      audit refs, dispatch selectors).

      Architect (lily) post-migration created thread-485 with `recipientAgentId=
      "eng-0d2c690e7dd5"` (greg's pre-migration ID; remembered from earlier-
      session). Hub's create_thread API accepted the value without validation.
      Hub's dispatch selector found zero agents matching the old ID:
        [Dispatch] Persisted notif-...: thread_message
        selector={"agentIds":["eng-0d2c690e7dd5"]} matched=0 agent(s)
      Notification persisted but never delivered. Director-surfaced as P0
      ("unable to communicate with greg").

      Pattern class: post-state-migration entity-references (agentIds, sessionIds,
      missionIds, etc.) embedded in higher-layer collections become orphaned
      without surface error. Composes-with feedback_schema_rename_requires_state_
