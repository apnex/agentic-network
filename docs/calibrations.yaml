  - id: 50
    class: substrate
    title: "Mission-pulse precondition `mission_idle_for_at_least` masks per-agent-idle in bilateral co-execution missions"
    origin: mission-66-W1W2
    surfaced_at: Director-flagged-2026-04-29
    status: open
    closure_mechanism: |
      Spec-level defect surfaced during mission-66 W1+W2 atomic execution
      (2026-04-29T~06:45Z UTC; Director-flagged engineer-idle observation +
      architect-evaluation in response).

      The pulse precondition `mission_idle_for_at_least` checks MISSION-WIDE idle:
      one participant's activity SUPPRESSES pulses for ALL participants. Designed for
      solo-architect missions (mission-65 precedent) where architect-active = mission-
      active = pulse-suppress made sense.

      Bilateral mission failure mode: architect activity masks engineer-idle;
      engineer-pulse never fires while architect is active. Mission-66 case:
      architect grep-report at 06:40Z reset the mission-idle clock; engineer-pulse
      won't fire until 15min of total mission silence. Engineer-idle goes undetected
      by pulse mechanism.

      Closure path (out-of-scope this mission per Anti-goal #1; future mission
      scope): introduce `agent_idle_for_at_least` predicate in
      `hub/src/policy/preconditions.ts` registry; migrate per-class default pulse
      templates to use per-agent precondition for bilateral missions. Mission-class
      taxonomy may also need per-agent-precondition default vs mission-wide default.
    cross_refs:
      - docs/methodology/mission-lifecycle.md
    tele_alignment:
      - tele-7
      - tele-2

