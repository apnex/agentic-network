  - id: 17
    class: substrate
    title: "Hub-rebuild gap in Pass 10 protocol"
    origin: mission-62-W5
    surfaced_at: P0-triage-2026-04-28
    status: closed-folded
    closure_mechanism: |
      P0 smoking gun layer 1: Pass 10 rebuild protocol covers SDK pkg + claude-plugin
      canonical-tree but does NOT extend to Hub container rebuild when Hub source
      changes. 2026-04-28 ~07:49 AEST Hub container restarted on stale image (created
