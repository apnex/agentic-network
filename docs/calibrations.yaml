  - id: 63
    class: substrate
    title: "Boot-fail-fast assertion for substrate primitives requiring host opt-in — `assertHostWiringComplete` pattern generalizable as substrate-introduction discipline"
    origin: post-mission-225-bug-53-cycle
    surfaced_at: bug-53 PR #180 (2026-05-06)
    status: open
    closure_mechanism: |
      Surfaced during bug-53 fix design (thread-481 round-2): bug-53 root cause =
      host integration was never written for mission-225 PollBackstop. Substrate
      code correct + unit-tested; both adapters never opted in via
      createSharedDispatcher. ZERO heartbeats fired in production undetected for
      ~96min post Hub-restart.

      Engineer (greg) proposed boot-time fail-fast assertion as the cheapest §6.4-
      equivalent gate. Implemented as `assertHostWiringComplete` in
      packages/network-adapter/src/dispatcher.ts; called by both shim.ts +
      opencode entrypoint post `agent.start()`. Boot-time fail-fast — bug-53
      class won't recur silently for THIS primitive.

      Generalization: any substrate primitive that requires host opt-in (where
      substrate ships in a shared package + host adapter wires it via opts) is
      susceptible to the same defect class. Universal structural prevention:

      DISCIPLINE: substrate primitives requiring host opt-in MUST ship with a
      boot-time fail-fast assertion that throws if host wiring is missing AND
      an explicit opt-out env var is not set. Called by all hosts post substrate-
      start. Eliminates silent-non-integration class structurally.

      Diagnostic signature: substrate-package opts surface accepts optional config;
      host-package never references the optional opts; substrate's behavior is
      no-op-when-not-configured; failure mode is silent absence of expected
      behavior.

      Tele alignment:
      - tele-6 (Deterministic Invincibility) — boot-time loud fail catches
        host-integration-never-written class at boot, not at prod-audit-discovery
      - tele-7 (Resilient Agentic Operations) — recovery is mechanical (set env
        var or wire config); error message names recovery path

      Closure path:
      (a) PROCEDURAL — file engineer-runtime memory entry documenting the pattern
      (b) STRUCTURAL — codify in docs/methodology/engineer-runtime.md as substrate-
        introduction discipline; cross-reference from mission-lifecycle.md Phase 4
        Design checklist + substrate-package README templates
      (c) AUDIT-RUBRIC PROMOTION — at Phase 4 Design, audit-rubric question:
        "if this substrate has any host-side opt-in pattern, does it ship with a
        boot-fail-fast assertion?". One-line rubric add; high-value low-friction.

      Architect-side recommendation: file mechanism (b) + (c) jointly as
      M-Boot-Fail-Fast-Substrate-Discipline (idea-candidate; route-(a) skip-direct
      candidate per scope simplicity).

      Architect-Director ratification: Director directive 2026-05-06 "File the
      calibrations".
