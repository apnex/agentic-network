  - id: 71
    class: methodology
    title: "Substrate-redesign collapses symptoms but doesn't auto-fix root-cause defects exposed by the collapse"
    origin: mission-78-W3-new + W3-new-extension
    surfaced_at: thread-545 architect-side scenario-02 re-dogfood post W3-new ship (8cab0aa) → GAP-3 squashCommit target-ref defect surfaced (Fix #8 v1.2.0 BLOCKER)
    status: closed-folded
    closure_mechanism: |
      Composes with calibration #70 (substrate-redesign-collapses-accidental-
      complexity). Calibration #70 captures the architectural-pathology recognition
      pattern — Director-progressive-question collapses accidental complexity.
      Calibration #71 captures the COROLLARY: the redesign collapses SYMPTOMS but
      may LEAVE UNDERLYING root-cause defects exposed for the first time when the
      collapse changes the system's invariants.

      Diagnostic signature: a substrate-redesign that dissolves a debate (e.g.
      "Fix #5 headRef → wip-branch vs defensive-fallback" debate dissolved by
      W3-new single-branch architecture per calibration #70 application) may
      leave latent root-cause defects that were MASKED by the prior symptom.
      The redesign expose these defects WITHOUT auto-fixing them; substrate-fix
      is still required.

      Application instance: mission-78 W3-new (8cab0aa) shipped single-branch
      architecture; Fix #5 debate dissolved (mission-branch now has content;
      runPublishLoop unchanged). BUT squashCommit step-(4) update-ref targeting
      baseRef (NOT headRef) — pre-existing bug at native-git-engine.ts:343 + iso-
      morphic-git-engine.ts equivalent — was MASKED pre-W3-new because:
        Pre-W3-new: mission-branch tree was empty (daemon committed to wip/<id>);
        squashCommit read empty tree from mission-branch; update-main to no-op-
        tree commit was harmless. "Fix #5 empty-squash failure-mode" was the
        observable symptom; root-cause (wrong-target-update) lurked.

      W3-new made mission-branch non-empty (daemon commits there directly).
      squashCommit now reads operator's edits → non-empty squashed commit →
      update-main lands real content on main locally (orphan-advance) + mission-
      branch UNCHANGED → pushWithRetry pushes daemon-commit (not squash) → silent
      ship of pre-squash content. The wrong-target-update BLOCKER surfaced at
      first architect-side dogfood post-W3-new ship.

      Resolution: Fix #8 (squashCommit step-(4) update-ref targets headRef not
      baseRef in BOTH engines) shipped in W3-new extension at 32ca5a3. The
      transparency-gate test that should have caught it was too permissive
      (separate calibration #72).

      Architect-discipline takeaway: when a substrate-redesign dissolves a debate
      or symptom, the redesign-ship is NOT sufficient — architect-side dogfood
      MUST validate the redesigned substrate against real upstream before
      declaring the wave converged. The dogfood IS the transparency gate per
      calibration #67 + #68 + feedback_substrate_extension_wire_flow_integration_
      test.md.
    cross_refs:
      - calibration #70 (substrate-redesign-collapses-accidental-complexity; this composes)
      - calibration #67 (synthetic engine-isolation tests mask SDK-internal-call-pattern defects)
      - calibration #68 (synthetic tests also mask DEFECTS-IN-THE-CALLER)
