  - id: 55
    class: methodology
    title: "Engineer-side autonomous-stop ONLY-when-thread-engaged-with-architect on a surfaced action; silent cadence-checkpoint is anti-pattern"
    origin: mission-66-W1W2
    surfaced_at: Director-directive-2026-04-29
    status: open
    closure_mechanism: |
      Director directive 2026-04-29 ~07:50Z UTC during mission-66 W1+W2 atomic
      execution: *"I don't want engineer to ever stop unless it has surfaced an
      action and is in thread communication with the architect"*.

      Context: engineer (greg) executed deliberate-cadence-checkpoint after commit
      2 push (auto-mode-on at the time; L mid-scope ~3-4 eng-day mission framing
      warranting per-commit checkpoints) WITHOUT surfacing the checkpoint as a
      thread event. Architect/Director observed "engineer-idle" pattern for ~70min;
      Director surfaced + corrected via thread-425.

      Discipline ratified: engineer-side autonomous-stop is valid ONLY when
      simultaneously: (i) action surfaced (e.g., commit-N-complete + cadence-
      decision-needed) AND (ii) thread communication with architect open
      (engineer awaits architect-side response on the surfaced action). Silent
      between-commit pauses without thread-comms are anti-pattern.

      Thread-heartbeat-on-progression discipline: engineer pings active coord-
      thread on each commit-push (per #54 closure-path option (c)) AND on each
