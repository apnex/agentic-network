  - id: 26
    class: substrate
    title: "Silent thread_message body truncation marker missing"
    origin: mission-63-W4
    surfaced_at: thread-403-round1
    status: closed-structurally
    closure_mechanism: |
      Surfaced empirically at W4 substrate-self-dogfood test #5 (thread-403 round-1,
      2026-04-28T05:05Z UTC). thread_message body renders inline (improvement from
      mission-62 W4 calibration #20 RED) but with ~250-char silent truncation and no
