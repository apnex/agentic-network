# Phase 2b exit thresholds — the permanent class-squashing spec for
# precision context engineering (tele-10 proposed; see idea-116).
#
# A measurement run passes if every target with `required: true` passes.
# Targets with `required: false` are observational (tracked, not gated).
#
# Matched via `scripts/architect-telemetry/aggregate.py` which emits a
# verdict of `pass | partial | fail` alongside the per-target breakdown.

phase: "2b"
revision_pattern: "architect-agent-*"

targets:
  # FR-SCOPE-REJECT class (ckpt-A)
  out_of_scope_rejections:
    required: true
    operator: "eq"
    value: 0
    comment: "Hot-path tool-scope leaks; Phase 2a baseline = 9 on ckpt-C revision hot path"

  # Accumulated-history + round exhaustion class (ckpt-B)
  max_tool_rounds_rate_pct:
    required: true
    operator: "lte"
    value: 10
    comment: "Fraction of threads hitting MAX_TOOL_ROUNDS. Baseline ~33% (2/6). ckpt-B hit 0%; ckpt-C hit 17% (1/6) — statistical dispersion. Target a stable ≤10%."

  # Token-spend target (cumulative)
  gemini_tokens_per_thread_p50:
    required: true
    operator: "lte"
    value: 50000
    comment: "Baseline p50 ~300k; Phase 2b target p50 ≤50k per thread"

  gemini_tokens_per_thread_p95:
    required: false
    operator: "lte"
    value: 200000
    comment: "Observational — tail risk on design-analysis-like prompts"

  # Production primary KPI (ckpt-C)
  virtual_tokens_saved:
    required: true
    operator: "gt"
    value: 0
    comment: "Architect-side ResponseSummarizer must emit VTS in production"

  summarize_rate_pct:
    required: false
    operator: "gte"
    value: 10
    comment: "Fraction of architect-side tool calls that trigger ResponseSummarizer"

  # Hygiene — telemetry is flowing
  tool_call_telemetry_events_min:
    required: true
    operator: "gte"
    value: 10
    comment: "If zero, architect cognitive pipeline regressed to not-wired state"
