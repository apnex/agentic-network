name: secret-scan

# Mission-45 Task 4: filename-pattern secret-scan CI merge-gate.
# Blocks files whose basenames match dangerous patterns (.tfvars, .tfstate*,
# .env*, .pem, .key, credentials.*, secrets.*, *private*) from landing on main.
#
# Why filename-check and not content-scan (gitleaks etc.)?
# Per brief §out-of-scope: content-level scanning is a v1.1 consideration.
# The observed failure class from mission-41 (subdirectory-gitignore-bypass)
# was fundamentally about sensitive FILENAMES slipping past gitignore rules,
# not about sensitive content hiding inside benign-named files. v1.0 closes
# the observed class; v1.1 expansion tracks when content-scanning becomes
# the bottleneck.
#
# Known-safe suffix allowlist (.example, .sample, .template):
# the mission-41 retrospective established the anonymize convention —
# sensitive config templates are committed with an `.example` suffix
# (e.g. prod.tfvars.example), placeholder values only. Allowlisting those
# suffixes avoids the predicted false-positive class while preserving
# the comprehensive dangerous-pattern list per brief §Director-flagged
# decision #4 (engineer-recommendation: comprehensive, subtract later).
#
# Scope: diff-only (newly ADDED files in the PR or push). Existing files
# that match dangerous patterns but predate this workflow are not blocked
# on modification — historical debt is out of scope; mission-41 already
# cleaned the known instances (d4cb120).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff against base.sha / before.sha is reliable
          fetch-depth: 0

      - name: Enumerate added files in diff
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            files=$(git diff --name-only --diff-filter=A "$PR_BASE_SHA" "$PR_HEAD_SHA" 2>/dev/null || true)
          else
            # push event
            if [[ "$PUSH_BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              # Initial branch push — no prior commit; scan all tracked files
              files=$(git ls-files)
            else
              files=$(git diff --name-only --diff-filter=A "$PUSH_BEFORE" "$PUSH_AFTER" 2>/dev/null || true)
            fi
          fi
          {
            echo 'files<<__END__'
            echo "$files"
            echo '__END__'
          } >> "$GITHUB_OUTPUT"
          if [[ -z "$files" ]]; then
            echo "No added files in this diff."
          else
            echo "Added files in diff:"
            echo "$files" | sed 's/^/  - /'
          fi

      - name: Pattern-match dangerous filenames
        env:
          FILES: ${{ steps.changed.outputs.files }}
        run: |
          set -euo pipefail

          # Dangerous basename patterns — brief §Scope Task 4 comprehensive list
          # (Director-flagged decision #4 defaulted to engineer-recommendation).
          DANGEROUS_PATTERNS=(
            '*.tfvars'
            '*.tfstate*'
            '*.env*'
            '*.pem'
            '*.key'
            'credentials.*'
            'secrets.*'
            '*private*'
          )

          # Known-safe suffix allowlist (mission-41 anonymize convention).
          SAFE_SUFFIXES=(
            '.example'
            '.sample'
            '.template'
          )

          violations=()

          # Case-insensitive matching — avoid trivial bypass via case variation.
          shopt -s nocasematch

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            base="${path##*/}"

            # Skip files whose basename ends with an allowlist suffix
            safe=0
            for suffix in "${SAFE_SUFFIXES[@]}"; do
              if [[ "$base" == *"$suffix" ]]; then
                safe=1
                break
              fi
            done
            if [[ "$safe" -eq 1 ]]; then
              continue
            fi

            # Check each dangerous pattern
            for pat in "${DANGEROUS_PATTERNS[@]}"; do
              if [[ "$base" == $pat ]]; then
                violations+=("$path (matched: $pat)")
                break
              fi
            done
          done <<< "$FILES"

          shopt -u nocasematch

          if [[ ${#violations[@]} -gt 0 ]]; then
            echo "::error::secret-scan: dangerous filename patterns detected"
            for v in "${violations[@]}"; do
              path="${v%% *}"
              echo "::error file=$path::$v"
              echo "  - $v"
            done
            echo ""
            echo "These filename patterns are blocked from landing on main per"
            echo "mission-45 secret-scan policy (ADR-023 Phase 1)."
            echo ""
            echo "If this is a known-safe placeholder, rename to use one of"
            echo "the allowlist suffixes: .example, .sample, .template"
            echo "(e.g. 'prod.tfvars' → 'prod.tfvars.example')."
            echo ""
            echo "If the filename is a genuine false positive, raise via the"
            echo "architect/engineer coordination thread; the pattern list is"
            echo "engineer-judgment-owned per brief §Director-flagged decision #4."
            exit 1
          fi

          echo "secret-scan: no dangerous filename patterns detected in diff"
