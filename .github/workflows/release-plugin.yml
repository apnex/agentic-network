name: release-plugin
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.4)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # F7 fold: scoped install (NOT --workspaces; opencode-plugin lockfile
      # references stale `ois-*.tgz` files that don't exist on disk per
      # M-Deployment-Hygiene PR #192 hot-fix). AG-5 cleanup deferred.
      #
      # --ignore-scripts: claude-plugin's prepare = `npm run build` would
      # invoke tsc against unbuilt sovereign dists. prepack-claude-plugin.sh
      # drives the topological build explicitly (cycle in network-adapter ↔
      # message-router requires multi-pass build).
      - name: Install scoped workspace symlinks (no prepare hooks)
        run: |
          npm install --no-audit --no-fund --ignore-scripts \
            --workspace=@apnex/claude-plugin \
            --workspace=@apnex/cognitive-layer \
            --workspace=@apnex/message-router \
            --workspace=@apnex/network-adapter

      # F1 + F2 + F4 folds: helper stages skills/ + packs sovereign tarballs +
      # swaps claude-plugin package.json deps + npm pack (prepare → npm run
      # build → tsc compiles dist/ + prepack writes build-info.json) into
      # release-artifacts/. Trap-cleanup restores all transient state.
      - name: Pack claude-plugin via prepack-staging helper
        run: bash scripts/build/lib/prepack-claude-plugin.sh

      # Calibration #62 verification gate — runtime check at artifact-shape
      # boundary. Pinned per format-regex discipline (4 invariants; no
      # hardcoded version values).
      - name: Verify release tarball structurally complete
        run: |
          TGZ=$(ls release-artifacts/*.tgz | head -1)
          if [ -z "$TGZ" ]; then
            echo "ERROR: no tarball in release-artifacts/" >&2
            exit 1
          fi
          tar tzf "$TGZ" | grep -q "package/dist/build-info.json" || \
            (echo "ERROR: build-info.json missing from $TGZ" >&2; exit 1)
          tar tzf "$TGZ" | grep -Eq "package/apnex-network-adapter-[0-9]+\.[0-9]+\.[0-9]+\.tgz" || \
            (echo "ERROR: apnex-network-adapter tarball missing from $TGZ" >&2; exit 1)
          tar tzf "$TGZ" | grep -Eq "package/apnex-cognitive-layer-[0-9]+\.[0-9]+\.[0-9]+\.tgz" || \
            (echo "ERROR: apnex-cognitive-layer tarball missing from $TGZ" >&2; exit 1)
          tar tzf "$TGZ" | grep -Eq "package/apnex-message-router-[0-9]+\.[0-9]+\.[0-9]+\.tgz" || \
            (echo "ERROR: apnex-message-router tarball missing from $TGZ" >&2; exit 1)
          tar tzf "$TGZ" | grep -q "package/skills/survey/" || \
            (echo "ERROR: skills/survey/ missing from $TGZ" >&2; exit 1)
          tar tzf "$TGZ" | grep -q "package/lib/bootstrap-skills.sh" || \
            (echo "ERROR: lib/bootstrap-skills.sh missing from $TGZ" >&2; exit 1)
          echo "✓ release tarball $TGZ structurally complete"

      - name: Create GitHub Release with tarball attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR: could not resolve release tag" >&2
            exit 1
          fi
          SHA=$(git rev-parse --short HEAD)
          NOTES=$(cat <<EOF
          Built from commit \`$SHA\`.

          ## Install (no source-clone required)

          \`\`\`
          gh release download $TAG --repo apnex-org/agentic-network --pattern 'apnex-claude-plugin-*.tgz'
          tar xzf apnex-claude-plugin-*.tgz
          bash package/install.sh
          \`\`\`

          Then restart Claude Code to activate the plugin.

          Verify build identity:
          \`\`\`
          cat ~/.claude/plugins/cache/agentic-network/agent-adapter/*/dist/build-info.json
          \`\`\`
          EOF
          )
          gh release create "$TAG" \
            --title "claude-plugin $TAG" \
            --notes "$NOTES" \
            release-artifacts/*.tgz
