name: test

# Mission-41 Wave 1 T5 (task-328): workflow-test-harness CI merge-gate.
# Mission-45 Fix B: `test` aggregator as the single branch-protection target.
#
# 2026-04-24 narrowed (PR #4): the `hub` vitest job is split out of the
# matrix and made the sole code-correctness gate. The remaining matrix cells
# (packages/cognitive-layer, packages/network-adapter, adapters/claude-plugin,
# adapters/opencode-plugin) continue to run for visibility but are
# non-blocking — they carry pre-existing infrastructure debt (workspace-
# package tarball deps gitignored as *.tgz and not regenerated in CI;
# cross-package imports without cross-package dep declaration). Failures in
# those cells do NOT block `test`, so they do not block PR merge. The
# `coverage-report-sync` job remains required.
#
# Path forward: file a follow-on mission to fix the adapter-tarball
# architecture (either commit tarballs, add a CI `npm pack` step, or
# migrate to npm workspaces). Once green, move the non-hub matrix cells
# back into the `needs` list on `test` to re-require them.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Required code-correctness gate ───────────────────────────────────
  vitest-hub:
    runs-on: ubuntu-latest
    name: vitest (hub)
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hub/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test

  # ── Required coverage-spec-sync gate ─────────────────────────────────
  coverage-report-sync:
    runs-on: ubuntu-latest
    name: workflow-test-coverage in-sync
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: hub/package-lock.json
      - name: Install hub deps
        run: npm ci
      - name: Regenerate coverage report
        run: npm run coverage:invariants
      - name: Verify committed report matches
        working-directory: ${{ github.workspace }}
        run: |
          if ! git diff --quiet -- docs/audits/workflow-test-coverage.md; then
            echo "::error::docs/audits/workflow-test-coverage.md is out of sync."
            echo "Run 'cd hub && npm run coverage:invariants' locally and commit the regenerated file."
            git diff -- docs/audits/workflow-test-coverage.md
            exit 1
          fi

  # ── Non-blocking visibility: other packages ──────────────────────────
  # `continue-on-error: true` keeps the matrix running and the check
  # statuses visible on the PR, but cell failures do not fail the job.
  # The aggregator `test` does NOT depend on this matrix today (see
  # comments at top of file for path-forward to re-require).
  vitest-non-hub:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/cognitive-layer
          - packages/network-adapter
          - adapters/claude-plugin
          - adapters/opencode-plugin
    name: vitest (${{ matrix.package }})
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test

  # ── Aggregator: single status-check name for branch-protection rules ─
  # Branch-protection rule targets `test` (a stable name); the
  # dependencies below decide what gates are load-bearing. Matrix
  # structure can evolve above without touching the rule.
  # Mission-45 Fix B (thread-275) established the aggregator pattern;
  # 2026-04-24 (PR #4) narrowed the `needs` list to drop the 4
  # infrastructure-broken matrix cells.
  test:
    name: test
    needs: [vitest-hub, coverage-report-sync]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required test jobs passed."
